# This rule is not used by the project ee-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ephemeral.hoaqim.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ee-operator
    app.kubernetes.io/managed-by: kustomize
  name: ephemeralenvironment-editor-role
rules:
- apiGroups:
  - ephemeral.hoaqim.dev
  resources:
  - ephemeralenvironments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ephemeral.hoaqim.dev
  resources:
  - ephemeralenvironments/status
  verbs:
  - get
