apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ee-operator.fullname" . }}-manager-role
  labels:
    {{- include "ee-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [namespaces, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [ephemeral.hoaqim.dev]
    resources: [ephemeralenvironments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [ephemeral.hoaqim.dev]
    resources: [ephemeralenvironments/status]
    verbs: [get, patch, update]
  - apiGroups: [ephemeral.hoaqim.dev]
    resources: [ephemeralenvironments/finalizers]
    verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ee-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "ee-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ee-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "ee-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}